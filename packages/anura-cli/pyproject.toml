[project]
name = "anura-cli"
dynamic = ["version"]
requires-python = ">=3.11"
dependencies = [
    "bleak>=1.1.1",
    "click>=8.3.1",
    "pyanura",
    "pyusb>=1.3.1",
    "zeroconf>=0.148.0",
]

[project.scripts]
anura = "anura_cli:main"

[build-system]
requires = ["setuptools>=80", "setuptools-scm[simple]>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."

[tool.uv.sources]
pyanura = { workspace = true }
