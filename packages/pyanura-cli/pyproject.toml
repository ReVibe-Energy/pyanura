[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
dynamic = ["version"]
name = "pyanura-cli"
requires-python = ">=3.11"
dependencies = [
    "pyanura",
    "bleak>=1.1.1",
    "click>=8.3.1",
    "pyusb>=1.3.1",
    "zeroconf>=0.148.0",
]

[project.scripts]
anura = "pyanura_cli:cli"

[tool.hatch.version]
path = "../../VERSION"
pattern = "(?P<version>.+)"

[tool.uv.sources]
pyanura = { workspace = true }
