[project]
dynamic = ["version"]
name = "pyanura-cli"
requires-python = ">=3.11"
dependencies = [
    "pyanura",
    "bleak>=1.1.1",
    "click>=8.3.1",
    "pyusb>=1.3.1",
    "zeroconf>=0.148.0",
]

[project.scripts]
anura = "pyanura_cli:cli"

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
root = "../.."

[tool.uv.sources]
pyanura = { workspace = true }
