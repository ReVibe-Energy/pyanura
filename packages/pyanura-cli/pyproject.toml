[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
dynamic = ["version"]
name = "pyanura-cli"
description = "Command-line interface for the pyanura library, exposing the 'anura' tool for interacting with ReVibe Anura sensors and transceivers."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "ReVibe Energy AB" },
]
keywords = ["anura", "revibe", "sensor", "transceiver", "cli"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications",
    "Topic :: Utilities",
]
dependencies = [
    "pyanura",
    "bleak>=1.1.1",
    "click>=8.3.1",
    "pyusb>=1.3.1",
    "zeroconf>=0.148.0",
]

[project.urls]
Homepage = "https://github.com/ReVibe-Energy/pyanura"
Source = "https://github.com/ReVibe-Energy/pyanura"
Issues = "https://github.com/ReVibe-Energy/pyanura/issues"
Documentation = "https://docs.revibeenergy.com/"

[project.scripts]
anura = "pyanura_cli:cli"

[tool.hatch.version]
path = "../../VERSION"
pattern = "(?P<version>.+)"

[tool.uv.sources]
pyanura = { workspace = true }
