name: Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  # Manually dispatched runs publish to public-dev; if dispatched against
  # a v* tag ref, the public-push step will also fire. Use sparingly.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --dev --all-packages

      - name: Validate VERSION against ref
        run: uv run scripts/reltool.py validate-version "${{ github.ref_type }}" "${{ github.ref_name }}"

      - name: Update VERSION for a snapshot release
        run: |
          REF_ARG=""
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            REF_ARG="--ref ${{ github.event.pull_request.head.sha }}"
          fi
          uv run scripts/reltool.py update-version --snapshot $REF_ARG

      - name: Build packages
        run: uv build --all-packages --wheel

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to Cloudsmith
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install & authenticate Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@18665afcce9f859312b61989671af9af7402e4fb
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Push to Cloudsmith public-dev
        run: |
          for f in dist/*.whl; do
            cloudsmith push python revibe-energy/public-dev "$f"
          done

      - name: Push to Cloudsmith public (tagged releases only)
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        run: |
          for f in dist/*.whl; do
            cloudsmith push python revibe-energy/public "$f"
          done
