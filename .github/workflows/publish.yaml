name: Publish

on:
  push:
    branches: ["wip/v1"] # TODO "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Build packages
        run: uv build --all-packages --wheel

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to Cloudsmith
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install & authenticate Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@18665afcce9f859312b61989671af9af7402e4fb
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Push to Cloudsmith
        run: |
          for f in dist/*.whl; do
            cloudsmith push python revibe-energy/public-dev "$f"
          done
